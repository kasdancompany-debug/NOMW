<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0a2233" />
    <title>Station offline — Northern Ontario Museum of Wonder</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #0a2233 0%, #0f241c 55%, #061018 100%);
        color: #eef3f6;
        font-family: "Segoe UI", "Avenir Next", Arial, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-family: Georgia, "Palatino Linotype", serif;
        font-weight: 500;
        font-size: clamp(1.75rem, 4vw, 2.75rem);
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0;
        max-width: 36rem;
        line-height: 1.5;
        color: #a8b5ae;
        font-size: 1.125rem;
      }
      .hint {
        margin-top: 1.5rem;
        color: #d4b07a;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>This station is offline</h1>
      <p>
        The exhibit will return when the local kiosk app is running again. No internet connection is
        required — only power and the museum’s local server on this PC or LAN.
      </p>
      <p class="hint">Staff: check power, then reopen the kiosk browser</p>
    </main>
  </body>
</html>
